<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Links Profile</title>
    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="container">
        <div class="personal-info">
          <img src="images/IMG_3856.JPG" alt="pro-pic" />
          <h2 class="name">Tonmoy Bhattacharjee</h2>
          <p class="location">Dhaka,Bangladesh</p>
          <p class="who-me">"Front-end developer and avid reader"</p>
        </div>
        <div class="links">
          <ul>
            <li>
              <a
                href="https://github.com/tonmoybht"
                class="github"
                target="_blank"
                >GitHub</a
              >
            </li>
            <li>
              <a
                href="https://www.frontendmentor.io/profile/tonmoybht"
                class="frontendMentor"
                target="_blank"
                >Frontend Mentor</a
              >
            </li>
            <li>
              <a
                href="https://www.linkedin.com/in/tonmoy07"
                class="linkedin"
                target="_blank"
                >LinkedIn</a
              >
            </li>
            <li>
              <a href="https://x.com/TonmoyBht" class="twitter" target="_blank"
                >Twitter</a
              >
            </li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
